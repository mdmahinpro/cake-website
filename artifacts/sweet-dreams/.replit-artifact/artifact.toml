kind = "web"
previewPath = "/"
title = "Sweet Dreams Cakes"
version = "1.0.0"
id = "artifacts/sweet-dreams"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19943

[services.development]
run = "pnpm --filter @workspace/sweet-dreams run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sweet-dreams", "run", "build" ]
publicDir = "artifacts/sweet-dreams/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19943"
BASE_PATH = "/"
